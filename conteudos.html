<script>
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');

  // Restaurar progresso ao carregar a página
  checkboxes.forEach(checkbox => {
    const saved = localStorage.getItem(checkbox.id);
    if (saved === 'true') {
      checkbox.checked = true;
    }
  });

  // Salvar progresso quando marcar/desmarcar
  checkboxes.forEach(checkbox => {
    checkbox.addEventListener('change', () => {
      localStorage.setItem(checkbox.id, checkbox.checked);
    });
  });

  // Alternar tema
    const themeToggle = document.createElement('button');
    themeToggle.className = 'theme-toggle';
    themeToggle.innerHTML = '🌙';
    themeToggle.title = 'Alternar tema claro/escuro';
    
    document.querySelector('.nav-links').appendChild(themeToggle);
    
    // Verificar tema salvo ou preferência do sistema
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    const savedTheme = localStorage.getItem('theme') || 
                      (prefersDark.matches ? 'dark' : 'light');
    
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.innerHTML = savedTheme === 'dark' ? '☀️' : '🌙';
    
    // Alternar tema ao clicar
    themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        document.documentElement.setAttribute('data-theme', newTheme);
        themeToggle.innerHTML = newTheme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', newTheme);
    });
    
    // Atualizar tema quando a preferência do sistema mudar
    prefersDark.addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) {
            const newTheme = e.matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeToggle.innerHTML = newTheme === 'dark' ? '☀️' : '🌙';
        }
    });
</script>
